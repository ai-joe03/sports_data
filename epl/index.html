<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPL Set Piece xG</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: #f4f4fb;
      color: #020202;
      min-height: 100vh;
    }

    header {
      background: #FFFBFF;
      border-bottom: 3px solid #FFA726;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header img.logo { height: 120px; width: auto; }
    header span { font-size: 16px; font-weight: 500; color: #020202; margin-left: auto; }

    .main { max-width: 1140px; margin: 0 auto; padding: 20px 16px; }

    /* Load bar */
    .load-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: #FFFBFF; border: 1px solid #d0d7de; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 12px;
    }
    .btn {
      padding: 5px 14px; font-size: 13px; font-weight: 500;
      border-radius: 6px; border: 1px solid; cursor: pointer;
    }
    .btn-primary { background: #2E30C4; color: #fff; border-color: #1f21a0; }
    .btn-primary:hover { background: #1f21a0; }
    .btn-primary:disabled { background: #9899e8; border-color: #9899e8; cursor: not-allowed; }
    .season-badge { font-size: 12px; font-weight: 600; color: #FFA726; margin-left: 6px; }

    /* Status */
    .status-msg {
      font-size: 13px; padding: 8px 14px; border-radius: 6px;
      margin-bottom: 10px; display: none;
    }
    .status-msg.error { background: #fff0f0; border: 1px solid #ff8182; color: #a40000; display: block; }
    .status-msg.info  { background: #eeeeff; border: 1px solid #9899e8; color: #1f21a0; display: block; }

    /* Controls */
    .controls {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: #FFFBFF; border: 1px solid #d0d7de; border-radius: 8px;
      padding: 10px 16px; margin-bottom: 14px;
    }
    .controls select {
      padding: 4px 8px; font-size: 13px; border: 1px solid #d0d7de;
      border-radius: 6px; background: #FFFBFF; cursor: pointer; outline: none;
    }
    .view-btn {
      padding: 4px 12px; font-size: 13px; border-radius: 6px;
      border: 1px solid #d0d7de; background: #f4f4fb;
      cursor: pointer; font-weight: 500; color: #020202;
    }
    .view-btn.active { background: #1a1c3e; color: #FFA726; border-color: #1a1c3e; }
    .view-btn:not(.active):hover { background: #e8e8f4; }
    .controls-label { font-size: 13px; font-weight: 500; color: #020202; }

    /* Chart panels */
    .chart-panel {
      background: #FFFBFF;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      overflow-x: auto;
    }
    .chart-panel h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #020202; }
    .chart-panel p  { font-size: 13px; color: #555; margin-bottom: 12px; }

    svg text { fill: #020202; }
    .axis path, .axis line { stroke: #d0d7de; }
    .axis text { fill: #555; font-size: 12px; }
    .grid line { stroke: #d0d7de; stroke-opacity: 0.4; stroke-dasharray: 2,3; }
    .grid path { display: none; }

    /* Tooltip */
    .tooltip {
      position: fixed;
      pointer-events: none;
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.15s;
      max-width: 300px;
    }
    .tooltip .tt-team { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
    .tooltip .tt-row  { display: flex; justify-content: space-between; gap: 16px; }
    .tooltip .tt-label { color: #555; }
    .tooltip .tt-val   { font-weight: 600; font-variant-numeric: tabular-nums; }
    .tooltip .tt-total { border-top: 1px solid #d0d7de; margin-top: 6px; padding-top: 6px; }
  </style>
</head>
<body>

<header>
  <a href="/"><img class="logo" src="/cv_logo_name.png" alt="Court Vision"></a>
  <span>EPL Set Piece xG</span>
</header>

<div class="main">

  <div class="load-bar">
    <button class="btn btn-primary" id="refreshBtn" onclick="loadEPL()">Refresh</button>
    <span class="season-badge" id="seasonBadge"></span>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="controls" id="controls" style="display:none">
    <span class="controls-label">Season:</span>
    <select id="season-select"></select>
    <span style="flex:1"></span>
    <button class="view-btn active" data-filter="all">All Set Pieces</button>
    <button class="view-btn" data-filter="FromCorner">Corners</button>
    <button class="view-btn" data-filter="SetPiece">Set Piece</button>
    <button class="view-btn" data-filter="DirectFreekick">Direct FK</button>
    <button class="view-btn" data-filter="Penalty">Penalties</button>
  </div>

  <div id="chart1-panel" class="chart-panel" style="display:none">
    <h2 id="chart1-title">Total Set Piece xG Created</h2>
    <p id="chart1-subtitle">Total expected goals created from set pieces per team, sorted highest to lowest</p>
    <svg id="chart1"></svg>
  </div>

  <div id="chart2-panel" class="chart-panel" style="display:none">
    <h2 id="chart2-title">Set Piece Efficiency: xG Created &minus; Conceded</h2>
    <p id="chart2-subtitle">Net set piece xG (positive = create more than they concede from set pieces)</p>
    <svg id="chart2"></svg>
  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── Data + state ──────────────────────────────────────────────────────
let ALL_DATA = null;
let activeFilter = "all";
let activeSeason = "2024";

const SITUATIONS = [
  { key: "FromCorner",     label: "Corners",    color: "#f97316" },
  { key: "SetPiece",       label: "Set Piece",  color: "#60a5fa" },
  { key: "DirectFreekick", label: "Direct FK",  color: "#a78bfa" },
  { key: "Penalty",        label: "Penalties",  color: "#34d399" },
];

const SHORT_NAMES = {
  "Wolverhampton Wanderers": "Wolves",
  "Manchester United": "Man Utd",
  "Manchester City": "Man City",
  "Newcastle United": "Newcastle",
  "Nottingham Forest": "Nott'm Forest",
  "Crystal Palace": "C. Palace",
  "Ipswich Town": "Ipswich",
  "Sheffield United": "Sheff Utd",
  "Huddersfield": "Huddersfield",
  "Hull City": "Hull",
  "Stoke City": "Stoke",
  "West Brom": "West Brom",
};

// ── Load ──────────────────────────────────────────────────────────────
async function loadEPL() {
  const btn = document.getElementById("refreshBtn");
  const statusEl = document.getElementById("statusMsg");
  btn.disabled = true;
  statusEl.className = "status-msg info";
  statusEl.textContent = "Loading data\u2026";

  try {
    const resp = await fetch("/api/epl");
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      throw new Error(err.error || resp.statusText);
    }
    ALL_DATA = await resp.json();

    // Populate season dropdown
    const seasonSelect = document.getElementById("season-select");
    seasonSelect.innerHTML = "";
    const keys = Object.keys(ALL_DATA).sort((a, b) => +b - +a);
    keys.forEach(key => {
      const opt = document.createElement("option");
      opt.value = key;
      opt.textContent = ALL_DATA[key].season;
      seasonSelect.appendChild(opt);
    });
    activeSeason = keys[0];
    seasonSelect.value = activeSeason;

    document.getElementById("seasonBadge").textContent = ALL_DATA[activeSeason].season;
    statusEl.className = "status-msg";

    // Show UI
    document.getElementById("controls").style.display = "";
    document.getElementById("chart1-panel").style.display = "";
    document.getElementById("chart2-panel").style.display = "";

    redrawAll();
  } catch (e) {
    statusEl.className = "status-msg error";
    statusEl.textContent = "Error loading data: " + e.message;
  } finally {
    btn.disabled = false;
  }
}

// ── Event wiring ──────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("season-select").addEventListener("change", function () {
    activeSeason = this.value;
    document.getElementById("seasonBadge").textContent = ALL_DATA[activeSeason].season;
    redrawAll();
  });

  document.querySelectorAll(".view-btn[data-filter]").forEach(btn => {
    btn.addEventListener("click", function () {
      document.querySelectorAll(".view-btn[data-filter]").forEach(b => b.classList.remove("active"));
      this.classList.add("active");
      activeFilter = this.dataset.filter;
      redrawAll();
    });
  });

  loadEPL();
});

// ── Helpers ───────────────────────────────────────────────────────────
function getTeams() {
  return ALL_DATA[activeSeason].teams.map(t => ({
    ...t,
    short: SHORT_NAMES[t.team] || t.team,
  }));
}

function redrawAll() {
  const teams = getTeams();
  drawBarChart(teams);
  drawEfficiency(teams);
}

// ── Shared tooltip helper ─────────────────────────────────────────────
function moveTooltip(event) {
  const tooltip = d3.select("#tooltip");
  const pad = 16;
  let left = event.clientX + pad, top = event.clientY + pad;
  const rect = tooltip.node().getBoundingClientRect();
  if (left + rect.width > window.innerWidth - 8) left = event.clientX - rect.width - pad;
  if (top + rect.height > window.innerHeight - 8) top = event.clientY - rect.height - pad;
  tooltip.style("left", left + "px").style("top", top + "px");
}
function hideTooltip() { d3.select("#tooltip").style("opacity", 0); }

// ── Chart 1: Total xG Created (stacked bar) ───────────────────────────
function drawBarChart(teamsRaw) {
  const svg = d3.select("#chart1");
  svg.selectAll("*").remove();

  const isAll = activeFilter === "all";
  const activeSituations = isAll ? SITUATIONS : SITUATIONS.filter(s => s.key === activeFilter);
  const filterLabel = isAll ? "All Set Pieces" : activeSituations[0].label;

  d3.select("#chart1-title").text("Total Set Piece xG Created \u2014 " + filterLabel);

  const teams = [...teamsRaw].sort((a, b) => {
    const aVal = activeSituations.reduce((s, sit) => s + a[sit.key].xG, 0);
    const bVal = activeSituations.reduce((s, sit) => s + b[sit.key].xG, 0);
    return bVal - aVal;
  });

  const margin = { top: 32, right: 60, bottom: 40, left: 110 };
  const barHeight = 28;
  const gap = 6;
  const width = 1100;
  const height = margin.top + margin.bottom + teams.length * (barHeight + gap);

  svg.attr("viewBox", "0 0 " + width + " " + height).attr("width", "100%");

  const xMax = d3.max(teams, d => activeSituations.reduce((s, sit) => s + d[sit.key].xG, 0));
  const x = d3.scaleLinear().domain([0, xMax * 1.12]).range([margin.left, width - margin.right]);
  const y = d3.scaleBand()
    .domain(teams.map(d => d.short))
    .range([margin.top, height - margin.bottom])
    .paddingInner(gap / (barHeight + gap));

  svg.append("g").attr("class", "grid").attr("transform", "translate(0," + margin.top + ")")
    .call(d3.axisTop(x).ticks(8).tickSize(-(height - margin.top - margin.bottom)).tickFormat(""));

  svg.append("g").attr("class", "axis").attr("transform", "translate(" + margin.left + ",0)")
    .call(d3.axisLeft(y).tickSize(0).tickPadding(8)).select(".domain").remove();

  svg.append("g").attr("class", "axis").attr("transform", "translate(0," + (height - margin.bottom) + ")")
    .call(d3.axisBottom(x).ticks(8).tickFormat(d => d.toFixed(1)));

  svg.append("text")
    .attr("x", (margin.left + width - margin.right) / 2).attr("y", height - 4)
    .attr("text-anchor", "middle").attr("font-size", 12).attr("fill", "#555")
    .text("Expected Goals (xG) \u2014 " + filterLabel);

  const tooltip = d3.select("#tooltip");
  const barsG = svg.append("g");

  teams.forEach(team => {
    let offset = 0;
    activeSituations.forEach(sit => {
      const val = team[sit.key].xG;
      barsG.append("rect")
        .attr("x", x(offset)).attr("y", y(team.short))
        .attr("width", Math.max(0, x(offset + val) - x(offset)))
        .attr("height", y.bandwidth()).attr("rx", 3)
        .attr("fill", sit.color).attr("opacity", 0.85)
        .on("mouseover", (event) => {
          let html = "<div class=\"tt-team\">" + team.team + "</div>";
          activeSituations.forEach(s => {
            const bold = s.key === sit.key ? "font-weight:700" : "";
            html += "<div class=\"tt-row\" style=\"" + bold + "\">"
              + "<span class=\"tt-label\"><span style=\"color:" + s.color + "\">&#9632;</span> " + s.label + "</span>"
              + "<span class=\"tt-val\">" + team[s.key].xG.toFixed(2) + " xG (" + team[s.key].goals + "g / " + team[s.key].shots + "sh)</span>"
              + "</div>";
          });
          if (isAll) {
            const total = activeSituations.reduce((s, sit) => s + team[sit.key].xG, 0);
            html += "<div class=\"tt-row tt-total\"><span class=\"tt-label\">Total</span><span class=\"tt-val\">" + total.toFixed(2) + " xG</span></div>";
          }
          tooltip.html(html).style("opacity", 1);
          moveTooltip(event);
        })
        .on("mousemove", moveTooltip)
        .on("mouseout", hideTooltip);
      offset += val;
    });
    barsG.append("text")
      .attr("x", x(offset) + 6).attr("y", y(team.short) + y.bandwidth() / 2)
      .attr("dy", "0.35em").attr("font-size", 12).attr("font-weight", 600).attr("fill", "#020202")
      .text(offset.toFixed(1));
  });

  // Legend in top margin
  if (isAll) {
    const lg = svg.append("g").attr("transform", "translate(" + margin.left + ", 6)");
    let lx = 0;
    SITUATIONS.forEach(s => {
      lg.append("rect").attr("x", lx).attr("width", 10).attr("height", 10).attr("rx", 2).attr("fill", s.color).attr("opacity", 0.85);
      lg.append("text").attr("x", lx + 14).attr("y", 9).attr("font-size", 11).attr("fill", "#555").text(s.label);
      lx += s.label.length * 7 + 24;
    });
  }
}

// ── Chart 2: Efficiency (for − against) centered on zero ─────────────
function drawEfficiency(teamsRaw) {
  const isAll = activeFilter === "all";
  const activeSituations = isAll ? SITUATIONS : SITUATIONS.filter(s => s.key === activeFilter);
  const filterLabel = isAll ? "All Set Pieces" : activeSituations[0].label;

  d3.select("#chart2-title").text("Set Piece Efficiency \u2014 " + filterLabel);
  d3.select("#chart2-subtitle").text("Net xG (created \u2212 conceded). Green = positive balance, red = conceding more than creating.");

  const teams = [...teamsRaw].map(t => {
    const forXG = activeSituations.reduce((s, sit) => s + t[sit.key].xG, 0);
    const againstXG = activeSituations.reduce((s, sit) => s + t[sit.key].against_xG, 0);
    return {
      ...t,
      short: SHORT_NAMES[t.team] || t.team,
      forXG, againstXG,
      net: +(forXG - againstXG).toFixed(2),
    };
  }).sort((a, b) => b.net - a.net);

  const svg = d3.select("#chart2");
  svg.selectAll("*").remove();

  const margin = { top: 12, right: 60, bottom: 40, left: 110 };
  const rowH = 30;
  const width = 1100;
  const height = margin.top + margin.bottom + teams.length * rowH;

  svg.attr("viewBox", "0 0 " + width + " " + height).attr("width", "100%");

  const absMax = d3.max(teams, d => Math.abs(d.net)) * 1.2;
  const x = d3.scaleLinear().domain([-absMax, absMax]).range([margin.left, width - margin.right]);
  const y = d3.scaleBand()
    .domain(teams.map(d => d.short))
    .range([margin.top, height - margin.bottom])
    .paddingInner(0.25);

  // Grid
  svg.append("g").attr("class", "grid").attr("transform", "translate(0," + margin.top + ")")
    .call(d3.axisTop(x).ticks(10).tickSize(-(height - margin.top - margin.bottom)).tickFormat(""));

  // Zero line
  svg.append("line")
    .attr("x1", x(0)).attr("x2", x(0))
    .attr("y1", margin.top).attr("y2", height - margin.bottom)
    .attr("stroke", "#020202").attr("stroke-width", 1).attr("stroke-opacity", 0.25);

  // Y axis
  svg.append("g").attr("class", "axis").attr("transform", "translate(" + margin.left + ",0)")
    .call(d3.axisLeft(y).tickSize(0).tickPadding(8)).select(".domain").remove();

  // X axis
  svg.append("g").attr("class", "axis").attr("transform", "translate(0," + (height - margin.bottom) + ")")
    .call(d3.axisBottom(x).ticks(10).tickFormat(d => (d > 0 ? "+" : "") + d.toFixed(1)));

  svg.append("text")
    .attr("x", (margin.left + width - margin.right) / 2).attr("y", height - 4)
    .attr("text-anchor", "middle").attr("font-size", 12).attr("fill", "#555")
    .text("Net Set Piece xG (Created \u2212 Conceded) \u2014 " + filterLabel);

  const tooltip = d3.select("#tooltip");

  teams.forEach(team => {
    const midY = y(team.short) + y.bandwidth() / 2;
    const positive = team.net >= 0;
    const col = positive ? "#87BBA2" : "#FF5A5F";
    const barX = positive ? x(0) : x(team.net);
    const barW = Math.abs(x(team.net) - x(0));

    // Bar
    svg.append("rect")
      .attr("x", barX).attr("y", y(team.short))
      .attr("width", barW).attr("height", y.bandwidth())
      .attr("rx", 3).attr("fill", col).attr("opacity", 0.9)
      .style("cursor", "pointer")
      .on("mouseover", (event) => {
        let html = "<div class=\"tt-team\">" + team.team + "</div>";
        activeSituations.forEach(sit => {
          html += "<div class=\"tt-row\">"
            + "<span class=\"tt-label\"><span style=\"color:" + sit.color + "\">&#9632;</span> " + sit.label + "</span>"
            + "<span class=\"tt-val\">+" + team[sit.key].xG.toFixed(2) + " / \u2212" + team[sit.key].against_xG.toFixed(2) + "</span>"
            + "</div>";
        });
        html += "<div class=\"tt-row tt-total\"><span class=\"tt-label\">xG Created</span><span class=\"tt-val\">" + team.forXG.toFixed(2) + "</span></div>";
        html += "<div class=\"tt-row\"><span class=\"tt-label\">xG Conceded</span><span class=\"tt-val\">" + team.againstXG.toFixed(2) + "</span></div>";
        html += "<div class=\"tt-row\" style=\"font-weight:700\"><span class=\"tt-label\">Net</span><span class=\"tt-val\" style=\"color:" + col + "\">" + (team.net > 0 ? "+" : "") + team.net.toFixed(2) + "</span></div>";
        tooltip.html(html).style("opacity", 1);
        moveTooltip(event);
      })
      .on("mousemove", moveTooltip)
      .on("mouseout", hideTooltip);

    // Value label
    const labelX = positive ? x(team.net) + 6 : x(team.net) - 6;
    const anchor = positive ? "start" : "end";
    svg.append("text")
      .attr("x", labelX).attr("y", midY).attr("dy", "0.35em")
      .attr("text-anchor", anchor).attr("font-size", 11).attr("font-weight", 600).attr("fill", col)
      .text((team.net > 0 ? "+" : "") + team.net.toFixed(2));
  });
}
</script>
</body>
</html>
